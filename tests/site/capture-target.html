<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Auto Page Capture Test Target</title>
    <style>
      body {
        font-family: sans-serif;
        margin: 32px;
        line-height: 1.5;
      }

      main {
        max-width: 720px;
      }

      .card {
        border: 1px solid #d0d7de;
        border-radius: 12px;
        padding: 16px;
        margin-top: 16px;
      }

      .hidden {
        display: none;
      }

      .status {
        font-weight: 700;
      }
    </style>
  </head>
  <body>
    <main>
      <h1>Auto Page Capture Test Target</h1>
      <p>This page is used by Playwright system tests.</p>

      <section class="card">
        <p class="status" id="status-text" data-ready="false">Waiting</p>
        <button id="activate-workflow" type="button">Activate workflow</button>
        <button id="continue-button" class="hidden" type="button">Continue</button>
      </section>

      <section class="card">
        <label for="edition-input">Edition</label>
        <input id="edition-input" name="edition" type="text" value="" />
      </section>

      <section class="card hidden" id="delayed-panel">
        <strong>Delayed panel ready</strong>
        <p>The delayed panel is visible.</p>
      </section>
    </main>

    <script>
      const statusText = document.getElementById('status-text');
      const activateButton = document.getElementById('activate-workflow');
      const continueButton = document.getElementById('continue-button');
      const delayedPanel = document.getElementById('delayed-panel');

      activateButton.addEventListener('click', () => {
        statusText.textContent = 'Preparing';

        setTimeout(() => {
          statusText.textContent = 'Ready';
          statusText.dataset.ready = 'true';
          continueButton.classList.remove('hidden');
          delayedPanel.classList.remove('hidden');
        }, 400);
      });

      continueButton.addEventListener('click', () => {
        statusText.textContent = 'Completed';
      });
    </script>
  </body>
</html>
