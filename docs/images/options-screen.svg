<svg width="1440" height="980" viewBox="0 0 1440 980" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Auto Page Capture settings screen</title>
  <desc id="desc">Preview illustration of the settings page showing the sidebar item list, detailed editor pane, logs, and sticky save footer.</desc>
  <defs>
    <linearGradient id="optionsBg" x1="120" y1="30" x2="1330" y2="950" gradientUnits="userSpaceOnUse">
      <stop stop-color="#EEF4FF"/>
      <stop offset="1" stop-color="#F3F6FB"/>
    </linearGradient>
    <filter id="optionsShadow" x="56" y="54" width="1328" height="862" filterUnits="userSpaceOnUse" color-interpolation-filters="sRGB">
      <feDropShadow dx="0" dy="24" stdDeviation="28" flood-color="#0F172A" flood-opacity="0.12"/>
    </filter>
  </defs>

  <rect width="1440" height="980" rx="40" fill="url(#optionsBg)"/>
  <circle cx="1206" cy="142" r="100" fill="#DBEAFE"/>
  <circle cx="182" cy="872" r="110" fill="#E0F2FE"/>

  <g filter="url(#optionsShadow)">
    <rect x="84" y="82" width="1272" height="806" rx="34" fill="#F3F6FB"/>
    <rect x="84.5" y="82.5" width="1271" height="805" rx="33.5" stroke="#DBE3EF"/>
  </g>

  <g font-family="Segoe UI, Arial, sans-serif">
    <text x="132" y="144" font-size="33" font-weight="700" fill="#0F172A">Auto Page Capture</text>
    <text x="132" y="174" font-size="15" fill="#64748B">Manage scheduled captures, permissions, and logs from one place.</text>

    <rect x="1042" y="110" width="120" height="42" rx="14" fill="#FFFFFF" stroke="#DBE3EF"/>
    <text x="1102" y="137" text-anchor="middle" font-size="15" font-weight="600" fill="#0F172A">English</text>
    <rect x="1178" y="110" width="84" height="42" rx="14" fill="#FFFFFF" stroke="#DBE3EF"/>
    <text x="1220" y="137" text-anchor="middle" font-size="15" font-weight="600" fill="#0F172A">Export</text>
    <rect x="1276" y="110" width="44" height="42" rx="14" fill="#1D4ED8"/>
    <text x="1298" y="137" text-anchor="middle" font-size="23" font-weight="700" fill="white">+</text>

    <rect x="132" y="214" width="340" height="410" rx="28" fill="#FFFFFF" stroke="#DBE3EF"/>
    <text x="160" y="258" font-size="22" font-weight="700" fill="#0F172A">Items</text>
    <rect x="336" y="234" width="108" height="38" rx="14" fill="#1D4ED8"/>
    <text x="390" y="258" text-anchor="middle" font-size="14" font-weight="700" fill="white">Add item</text>

    <rect x="160" y="290" width="284" height="42" rx="14" fill="#F8FAFC" stroke="#DBE3EF"/>
    <text x="182" y="316" font-size="14" fill="#64748B">Search by name, description, or URL</text>

    <rect x="160" y="356" width="82" height="30" rx="15" fill="#1D4ED8"/>
    <text x="201" y="375" text-anchor="middle" font-size="12" font-weight="700" fill="white">All</text>
    <rect x="250" y="356" width="110" height="30" rx="15" fill="#EFF6FF"/>
    <text x="305" y="375" text-anchor="middle" font-size="12" font-weight="700" fill="#1D4ED8">Needs access</text>
    <rect x="368" y="356" width="76" height="30" rx="15" fill="#FFFFFF" stroke="#DBE3EF"/>
    <text x="406" y="375" text-anchor="middle" font-size="12" font-weight="700" fill="#0F172A">Enabled</text>

    <rect x="160" y="408" width="284" height="124" rx="22" fill="#EFF6FF" stroke="#93C5FD"/>
    <text x="184" y="438" font-size="12" font-weight="700" fill="#1D4ED8">Item 1</text>
    <rect x="338" y="418" width="84" height="24" rx="12" fill="#DBEAFE"/>
    <text x="380" y="434" text-anchor="middle" font-size="11" font-weight="700" fill="#1D4ED8">OK</text>
    <text x="184" y="470" font-size="18" font-weight="700" fill="#0F172A">Daily product news</text>
    <text x="184" y="494" font-size="13" fill="#64748B">Capture the latest product updates every morning.</text>
    <text x="184" y="518" font-size="13" fill="#64748B">Next run: 2026-03-23 09:00 / Every 1 day</text>

    <rect x="160" y="548" width="284" height="58" rx="20" fill="#FFFFFF" stroke="#DBE3EF"/>
    <text x="184" y="577" font-size="16" font-weight="700" fill="#0F172A">Weekly chart archive</text>
    <text x="184" y="596" font-size="12" fill="#8A5A00">Needs permission</text>

    <rect x="500" y="214" width="800" height="410" rx="28" fill="#FFFFFF" stroke="#DBE3EF"/>
    <text x="536" y="256" font-size="24" font-weight="700" fill="#0F172A">Daily product news</text>
    <text x="536" y="282" font-size="14" fill="#64748B">Edit the selected item and preview the final saved output.</text>

    <text x="536" y="332" font-size="14" font-weight="700" fill="#0F172A">Name</text>
    <rect x="536" y="344" width="352" height="44" rx="14" fill="#FFFFFF" stroke="#DBE3EF"/>
    <text x="556" y="372" font-size="15" fill="#0F172A">Daily product news</text>

    <text x="914" y="332" font-size="14" font-weight="700" fill="#0F172A">Save format</text>
    <rect x="914" y="344" width="160" height="44" rx="14" fill="#FFFFFF" stroke="#DBE3EF"/>
    <text x="934" y="372" font-size="15" fill="#0F172A">PDF</text>
    <text x="1054" y="372" font-size="15" fill="#64748B">▾</text>

    <text x="1098" y="332" font-size="14" font-weight="700" fill="#0F172A">Close tab</text>
    <rect x="1098" y="344" width="160" height="44" rx="14" fill="#FFFFFF" stroke="#DBE3EF"/>
    <text x="1118" y="372" font-size="15" fill="#0F172A">Close</text>

    <text x="536" y="420" font-size="14" font-weight="700" fill="#0F172A">URL</text>
    <rect x="536" y="432" width="722" height="44" rx="14" fill="#FFFFFF" stroke="#DBE3EF"/>
    <text x="556" y="460" font-size="15" fill="#64748B">https://example.com/news</text>

    <rect x="536" y="504" width="722" height="88" rx="18" fill="#F8FAFC" stroke="#DBE3EF"/>
    <text x="556" y="534" font-size="13" font-weight="700" fill="#0F172A">Schedule 1</text>
    <rect x="556" y="546" width="190" height="30" rx="10" fill="#FFFFFF" stroke="#DBE3EF"/>
    <text x="572" y="566" font-size="12" fill="#0F172A">2026-03-22T09:00</text>
    <rect x="764" y="546" width="170" height="30" rx="10" fill="#FFFFFF" stroke="#DBE3EF"/>
    <text x="780" y="566" font-size="12" fill="#0F172A">Every 1 day</text>
    <rect x="952" y="546" width="284" height="30" rx="10" fill="#EFF6FF"/>
    <text x="972" y="566" font-size="12" fill="#1D4ED8">Allowed origin: https://example.com/*</text>

    <rect x="536" y="612" width="722" height="2" fill="#E2E8F0"/>

    <rect x="132" y="648" width="1168" height="168" rx="28" fill="#FFFFFF" stroke="#DBE3EF"/>
    <text x="160" y="690" font-size="22" font-weight="700" fill="#0F172A">Logs</text>
    <text x="160" y="716" font-size="14" fill="#64748B">Review recent activity and export logs when needed.</text>

    <rect x="160" y="742" width="160" height="40" rx="14" fill="#FFFFFF" stroke="#DBE3EF"/>
    <text x="182" y="767" font-size="14" fill="#64748B">Log retention: 300</text>

    <rect x="350" y="742" width="420" height="40" rx="14" fill="#F8FAFC" stroke="#DBE3EF"/>
    <text x="372" y="767" font-size="14" fill="#64748B">2 logs stored. Oldest records are removed first.</text>

    <rect x="1024" y="742" width="96" height="38" rx="14" fill="#FFFFFF" stroke="#DBE3EF"/>
    <text x="1072" y="766" text-anchor="middle" font-size="14" font-weight="600" fill="#0F172A">JSON</text>
    <rect x="1136" y="742" width="96" height="38" rx="14" fill="#FFFFFF" stroke="#DBE3EF"/>
    <text x="1184" y="766" text-anchor="middle" font-size="14" font-weight="600" fill="#0F172A">CSV</text>

    <rect x="132" y="838" width="1168" height="40" rx="20" fill="#FFFFFF" fill-opacity="0.94" stroke="#DBE3EF"/>
    <text x="160" y="863" font-size="14" fill="#64748B">No unsaved changes</text>
    <rect x="1080" y="846" width="88" height="24" rx="12" fill="#FFFFFF" stroke="#DBE3EF"/>
    <text x="1124" y="862" text-anchor="middle" font-size="12" font-weight="700" fill="#0F172A">Cancel</text>
    <rect x="1180" y="846" width="92" height="24" rx="12" fill="#1D4ED8"/>
    <text x="1226" y="862" text-anchor="middle" font-size="12" font-weight="700" fill="white">Save</text>
  </g>
</svg>
