<svg width="920" height="1120" viewBox="0 0 920 1120" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Auto Page Capture popup screen</title>
  <desc id="desc">Preview illustration of the popup screen showing summary cards, capture items, and recent history.</desc>
  <defs>
    <linearGradient id="popupBg" x1="80" y1="40" x2="860" y2="1080" gradientUnits="userSpaceOnUse">
      <stop stop-color="#EAF2FF"/>
      <stop offset="1" stop-color="#F8FAFC"/>
    </linearGradient>
    <filter id="popupShadow" x="82" y="86" width="756" height="950" filterUnits="userSpaceOnUse" color-interpolation-filters="sRGB">
      <feDropShadow dx="0" dy="24" stdDeviation="28" flood-color="#0F172A" flood-opacity="0.12"/>
    </filter>
  </defs>

  <rect width="920" height="1120" rx="40" fill="url(#popupBg)"/>
  <circle cx="134" cy="118" r="46" fill="#DBEAFE"/>
  <circle cx="770" cy="1006" r="78" fill="#E0F2FE"/>

  <g filter="url(#popupShadow)">
    <rect x="120" y="120" width="680" height="880" rx="34" fill="#F8FAFC"/>
    <rect x="120.5" y="120.5" width="679" height="879" rx="33.5" stroke="#D7DEEA"/>
  </g>

  <g font-family="Segoe UI, Arial, sans-serif" fill="#0F172A">
    <rect x="164" y="170" width="40" height="40" rx="12" fill="#1D4ED8"/>
    <text x="184" y="196" text-anchor="middle" font-size="22" font-weight="700" fill="white">A</text>
    <text x="222" y="186" font-size="27" font-weight="700">Auto Page Capture</text>
    <text x="222" y="214" font-size="14" fill="#64748B">Run saved items now and review the latest activity.</text>

    <rect x="694" y="168" width="54" height="42" rx="14" fill="#FFFFFF" stroke="#D7DEEA"/>
    <text x="721" y="194" text-anchor="middle" font-size="19" font-weight="700">↗</text>

    <rect x="164" y="246" width="176" height="104" rx="22" fill="#FFFFFF" stroke="#D7DEEA"/>
    <text x="188" y="280" font-size="13" fill="#64748B">Enabled</text>
    <text x="188" y="322" font-size="34" font-weight="700">2</text>

    <rect x="372" y="246" width="176" height="104" rx="22" fill="#FFF7DB" stroke="#F2C96D"/>
    <text x="396" y="280" font-size="13" fill="#8A5A00">Needs permission</text>
    <text x="396" y="322" font-size="34" font-weight="700" fill="#8A5A00">1</text>

    <rect x="580" y="246" width="176" height="104" rx="22" fill="#FFFFFF" stroke="#D7DEEA"/>
    <text x="604" y="280" font-size="13" fill="#64748B">Recent history</text>
    <text x="604" y="322" font-size="34" font-weight="700">2</text>

    <text x="164" y="396" font-size="22" font-weight="700">Items</text>
    <rect x="698" y="370" width="58" height="36" rx="12" fill="#FFFFFF" stroke="#D7DEEA"/>
    <text x="727" y="393" text-anchor="middle" font-size="14" font-weight="600">Refresh</text>

    <rect x="164" y="420" width="592" height="132" rx="24" fill="#FFFFFF" stroke="#D7DEEA"/>
    <rect x="186" y="444" width="110" height="28" rx="14" fill="#DBEAFE"/>
    <text x="241" y="463" text-anchor="middle" font-size="12" font-weight="700" fill="#1D4ED8">OK</text>
    <text x="186" y="499" font-size="21" font-weight="700">Daily product news</text>
    <text x="186" y="528" font-size="14" fill="#64748B">09:00 / Every 1 day / PDF</text>
    <text x="186" y="548" font-size="14" fill="#64748B">example.com/news</text>
    <rect x="628" y="456" width="104" height="40" rx="14" fill="#1D4ED8"/>
    <text x="680" y="482" text-anchor="middle" font-size="15" font-weight="700" fill="white">Run</text>

    <rect x="164" y="570" width="592" height="132" rx="24" fill="#FFFFFF" stroke="#D7DEEA"/>
    <rect x="186" y="594" width="142" height="28" rx="14" fill="#FFF7DB"/>
    <text x="257" y="613" text-anchor="middle" font-size="12" font-weight="700" fill="#8A5A00">Needs permission</text>
    <text x="186" y="649" font-size="21" font-weight="700">Weekly chart archive</text>
    <text x="186" y="678" font-size="14" fill="#64748B">21:15 / Every 1 week / PNG</text>
    <text x="186" y="698" font-size="14" fill="#64748B">www.billboard.com/charts/</text>
    <rect x="588" y="606" width="144" height="40" rx="14" fill="#FFFFFF" stroke="#D7DEEA"/>
    <text x="660" y="632" text-anchor="middle" font-size="15" font-weight="700">Grant access</text>

    <text x="164" y="754" font-size="22" font-weight="700">Recent history</text>
    <text x="164" y="778" font-size="14" fill="#64748B">The latest runs are shown here. Full logs are available in Settings.</text>

    <rect x="164" y="804" width="592" height="68" rx="20" fill="#FFFFFF" stroke="#D7DEEA"/>
    <text x="188" y="834" font-size="17" font-weight="700">Daily product news</text>
    <text x="188" y="858" font-size="13" fill="#64748B">success / 2026-03-22 08:45:00 / product_news_20260322_084500.pdf</text>

    <rect x="164" y="888" width="592" height="68" rx="20" fill="#FFFFFF" stroke="#D7DEEA"/>
    <text x="188" y="918" font-size="17" font-weight="700">Weekly chart archive</text>
    <text x="188" y="942" font-size="13" fill="#64748B">error / 2026-03-21 21:15:00 / Site access has not been granted yet.</text>

    <rect x="164" y="974" width="592" height="2" fill="#E2E8F0"/>
    <text x="164" y="1012" font-size="13" fill="#64748B">Popup preview for the GitHub README</text>
  </g>
</svg>
